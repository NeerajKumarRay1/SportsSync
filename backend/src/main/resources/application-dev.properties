# Development Environment Configuration

# Database Configuration
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/sportsync_dev}
spring.datasource.username=${DATABASE_USERNAME:sportsync_dev}
spring.datasource.password=${DATABASE_PASSWORD:sportsync_dev}

# HikariCP Connection Pool - Development Settings
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.pool-name=SportSyncDevHikariCP
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=20000

# JPA / Hibernate - Development Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging - Development Settings
logging.level.com.sportsync=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.web=DEBUG

# CORS - Development Settings (Allow all origins for development)
spring.mvc.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173

# Development-specific features
spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Flyway - Development Settings
spring.flyway.enabled=true
spring.flyway.clean-disabled=false
spring.flyway.baseline-on-migrate=true
# JWT Config
jwt.secret=${APP_JWT_SECRET:dev-secret-change-me-in-production-32ch-12345}
jwt.expiration-ms=86400000


app.jwt.secret=${APP_JWT_SECRET:dev-secret-change-me-in-production-32ch-12345}
app.jwt.expiration-ms=86400000

